name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this if your main branch is named differently (e.g., 'master')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest


    environment: env

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create .env file 📝
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_YOCO_PUBLIC_KEY: ${{ secrets.VITE_YOCO_PUBLIC_KEY }}
          YOCO_SECRET_KEY: ${{ secrets.YOCO_SECRET_KEY }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
        run: |
          # Create .env and clean values that might have been pasted as KEY=VALUE
          for var in $(env | grep -E '^(VITE_|GEMINI_|YOCO_|PAYPAL_)'); do
            name=$(echo "$var" | cut -d'=' -f1)
            # Take everything after the first '=', then check if it contains another '='
            val=$(echo "$var" | cut -d'=' -f2-)
            if [[ "$val" == *"$name="* ]]; then
              val=$(echo "$val" | sed "s/^$name=//")
            fi
            echo "$name=$val" >> .env
          done

      - name: CI Diagnostic 🔍
        run: |
          echo "Checking .env file structure..."
          ls -l .env
          echo "Line count (target 14+):"
          wc -l .env
          echo "Verifying Project ID (Masked):"
          grep VITE_FIREBASE_PROJECT_ID .env | cut -d'=' -f2 | sed 's/./*/g'

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
