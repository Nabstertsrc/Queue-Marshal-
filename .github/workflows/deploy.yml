name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this if your main branch is named differently (e.g., 'master')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest


    environment: gh-pages

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create .env file 📝
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets['VITE_FIREBASE_API_KEY'] || vars['VITE_FIREBASE_API_KEY'] }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets['VITE_FIREBASE_AUTH_DOMAIN'] || vars['VITE_FIREBASE_AUTH_DOMAIN'] }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets['VITE_FIREBASE_PROJECT_ID'] || vars['VITE_FIREBASE_PROJECT_ID'] }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets['VITE_FIREBASE_STORAGE_BUCKET'] || vars['VITE_FIREBASE_STORAGE_BUCKET'] }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets['VITE_FIREBASE_MESSAGING_SENDER_ID'] || vars['VITE_FIREBASE_MESSAGING_SENDER_ID'] }}
          VITE_FIREBASE_APP_ID: ${{ secrets['VITE_FIREBASE_APP_ID'] || vars['VITE_FIREBASE_APP_ID'] }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets['VITE_FIREBASE_MEASUREMENT_ID'] || vars['VITE_FIREBASE_MEASUREMENT_ID'] }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets['VITE_GOOGLE_MAPS_API_KEY'] || vars['VITE_GOOGLE_MAPS_API_KEY'] }}
          VITE_API_URL: ${{ secrets['VITE_API_URL'] || vars['VITE_API_URL'] || 'https://queue-marshal-server-production.up.railway.app' }}
          VITE_YOCO_PUBLIC_KEY: ${{ secrets['VITE_YOCO_PUBLIC_KEY'] || vars['VITE_YOCO_PUBLIC_KEY'] }}
          VITE_PAYPAL_CLIENT_ID: ${{ secrets['VITE_PAYPAL_CLIENT_ID'] || vars['VITE_PAYPAL_CLIENT_ID'] }}
        run: |
          cat << EOF > .env
          VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET
          VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID
          VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID
          VITE_FIREBASE_MEASUREMENT_ID=$VITE_FIREBASE_MEASUREMENT_ID
          VITE_GOOGLE_MAPS_API_KEY=$VITE_GOOGLE_MAPS_API_KEY
          VITE_API_URL=$VITE_API_URL
          VITE_YOCO_PUBLIC_KEY=$VITE_YOCO_PUBLIC_KEY
          VITE_PAYPAL_CLIENT_ID=$VITE_PAYPAL_CLIENT_ID
          EOF

      - name: CI Diagnostic 🔍
        run: |
          echo "Final .env line count:"
          wc -l .env
          echo "Verifying Project ID (Masked):"
          grep VITE_FIREBASE_PROJECT_ID .env | cut -d'=' -f2 | sed 's/./*/g'

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
