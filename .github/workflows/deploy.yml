name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this if your main branch is named differently (e.g., 'master')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest


    environment: env

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create .env file 📝
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_YOCO_PUBLIC_KEY: ${{ secrets.VITE_YOCO_PUBLIC_KEY }}
          YOCO_SECRET_KEY: ${{ secrets.YOCO_SECRET_KEY }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
        run: |
          # Robust way to create .env without duplications
          for var in $(env | grep -E '^(VITE_|GEMINI_|YOCO_|PAYPAL_)'); do
            # If the value contains another "VITE_...", strip it
            key=$(echo "$var" | cut -d'=' -f1)
            value=$(echo "$var" | cut -d'=' -f2-)
            clean_value=$(echo "$value" | sed "s/^$key=//")
            echo "$key=$clean_value" >> .env
          done

      - name: CI Diagnostic 🔍
        run: |
          echo "Checking .env file size (should be > 0)..."
          ls -l .env
          echo "Line count in .env (should be 14):"
          wc -l .env

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
