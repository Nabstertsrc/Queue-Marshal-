name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this if your main branch is named differently (e.g., 'master')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest


    environment: env

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create .env file 📝
        run: |
          # Create an empty .env file
          touch .env
          
          # Function to add to .env if value exists
          add_env() {
            local name=$1
            local secret_val="${2}"
            local var_val="${3}"
            
            # Use secret first, then var
            local val="${secret_val:-$var_val}"
            
            if [ -n "$val" ]; then
              # Clean any accidental "KEY=" prefix if user pasted the whole line
              if [[ "$val" == *"$name="* ]]; then
                val=$(echo "$val" | sed "s/^$name=//")
              fi
              echo "$name=$val" >> .env
              echo "✅ Added $name"
            else
              echo "⚠️ Missing $name (Skipped)"
            fi
          }

          # Map every required variable
          add_env "VITE_FIREBASE_API_KEY" "${{ secrets.VITE_FIREBASE_API_KEY }}" "${{ vars.VITE_FIREBASE_API_KEY }}"
          add_env "VITE_FIREBASE_AUTH_DOMAIN" "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" "${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}"
          add_env "VITE_FIREBASE_PROJECT_ID" "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" "${{ vars.VITE_FIREBASE_PROJECT_ID }}"
          add_env "VITE_FIREBASE_STORAGE_BUCKET" "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" "${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}"
          add_env "VITE_FIREBASE_MESSAGING_SENDER_ID" "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" "${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}"
          add_env "VITE_FIREBASE_APP_ID" "${{ secrets.VITE_FIREBASE_APP_ID }}" "${{ vars.VITE_FIREBASE_APP_ID }}"
          add_env "VITE_FIREBASE_MEASUREMENT_ID" "${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" "${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}"
          add_env "VITE_GOOGLE_MAPS_API_KEY" "${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" "${{ vars.VITE_GOOGLE_MAPS_API_KEY }}"
          add_env "VITE_API_URL" "${{ secrets.VITE_API_URL }}" "${{ vars.VITE_API_URL }}"
          add_env "VITE_YOCO_PUBLIC_KEY" "${{ secrets.VITE_YOCO_PUBLIC_KEY }}" "${{ vars.VITE_YOCO_PUBLIC_KEY }}"
          add_env "VITE_PAYPAL_CLIENT_ID" "${{ secrets.VITE_PAYPAL_CLIENT_ID }}" "${{ vars.VITE_PAYPAL_CLIENT_ID }}"

      - name: CI Diagnostic 🔍
        run: |
          echo "Final .env line count:"
          wc -l .env
          echo "Verifying Project ID (Masked):"
          grep VITE_FIREBASE_PROJECT_ID .env | cut -d'=' -f2 | sed 's/./*/g'

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
