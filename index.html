<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue-Marshal | On-Demand Queue Service</title>
  <meta name="description"
    content="Queue-Marshal connects you with trusted marshals who stand in queues on your behalf. Save time, get things done." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <script>
    function initMap() {
      window.googleMapsApiLoaded = true;
      window.dispatchEvent(new CustomEvent('google-maps-api-loaded'));
    }
  </script>
  <script>
    const key = import.meta.env.VITE_GOOGLE_MAPS_API_KEY;
    if (key && !key.startsWith('%')) {
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places,marker&callback=initMap&loading=async`;
      script.async = true;
      script.defer = true;
      script.onerror = () => window.dispatchEvent(new CustomEvent('google-maps-api-error', { detail: { message: 'Google Maps script failed to load.' } }));
      document.head.appendChild(script);
    } else {
      console.error('Google Maps API Key missing or incorrectly formatted in .env');
    }
  </script>

  <!-- Payment Gateway SDKs -->
  <script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js" async></script>

  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.4",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^0.15.0",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0"
  }
}
</script>
</head>

<body class="bg-dark-900 text-white">
  <div id="root"></div>
  <!-- Firebase SDKs -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
